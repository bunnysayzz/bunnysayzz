<svg viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
  <!-- Animated terminal hero for the GitHub profile README.
       Pure CSS/SMIL animation: types `whoami`, prints an ASCII banner with a
       flowing gradient, cycles taglines, sweeps a CRT scanline. No scripts,
       no external assets — plays anywhere GitHub renders the README. -->
  <defs>
    <linearGradient id="flow" gradientUnits="userSpaceOnUse" x1="-440" y1="0" x2="0" y2="0">
      <stop offset="0"   stop-color="#f59014"/>
      <stop offset=".35" stop-color="#ffd9a0"/>
      <stop offset=".65" stop-color="#4fd6c8"/>
      <stop offset="1"   stop-color="#b8a2f2"/>
      <animate attributeName="x1" values="-440;440" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;880" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset=".5" stop-color="#ffffff" stop-opacity=".045"/>
      <stop offset="1"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"  stop-color="#4fd6c8" stop-opacity="0"/>
      <stop offset=".5" stop-color="#4fd6c8" stop-opacity=".85"/>
      <stop offset="1"  stop-color="#4fd6c8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame"><rect x="8" y="8" width="864" height="384" rx="16"/></clipPath>
  </defs>

  <style>
    .cmd {
      clip-path: inset(0 100% 0 0);
      animation: typeCmd 1.1s steps(6, end) .6s forwards;
    }
    @keyframes typeCmd { to { clip-path: inset(0 -2% 0 0); } }

    .px {
      opacity: 0; transform: translateY(6px);
      animation: pop .3s cubic-bezier(.2,1.4,.4,1) forwards;
    }
    @keyframes pop { to { opacity: 1; transform: translateY(0); } }

    .fin { opacity: 0; animation: pop .25s ease-out 3.2s forwards; }
    .caret { animation: blink 1.05s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .tag { opacity: 0; }
    .t0 { animation: cycle 12s linear 3.4s infinite; }
    .t1 { animation: cycle 12s linear 7.4s infinite; }
    .t2 { animation: cycle 12s linear 11.4s infinite; }
    @keyframes cycle {
      0%   { opacity: 0; }
      2%   { opacity: 1; }
      31%  { opacity: 1; }
      33%  { opacity: 0; }
      100% { opacity: 0; }
    }

    .scanline { animation: sweep 6.5s linear infinite; }
    @keyframes sweep {
      from { transform: translateY(-80px); }
      to   { transform: translateY(410px); }
    }
    .edgeglow { animation: pulse 4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .25; } 50% { opacity: .9; } }

    @media (prefers-reduced-motion: reduce) {
      .cmd, .px, .fin, .tag, .caret { animation: none; }
      .cmd { clip-path: none; }
      .px, .fin { opacity: 1; transform: none; }
      .t0 { opacity: 1; }
      .scanline, .edgeglow { animation: none; opacity: 0; }
    }
  </style>

  <!-- Terminal card -->
  <rect x="8" y="8" width="864" height="384" rx="16" fill="#0c0f14" stroke="#2e3540" stroke-width="1.5"/>
  <g clip-path="url(#frame)">
    <!-- Title bar -->
    <rect x="8" y="8" width="864" height="34" fill="#141922"/>
    <circle cx="34" cy="25" r="6" fill="#ff5f57"/>
    <circle cx="54" cy="25" r="6" fill="#febc2e"/>
    <circle cx="74" cy="25" r="6" fill="#28c840"/>
    <text x="440" y="29" text-anchor="middle" font-size="12" fill="#8a94a6">azhar — zsh</text>

    <!-- Prompt: types `whoami` -->
    <text x="48" y="80" font-size="15" fill="#e6edf3">
      <tspan fill="#4fd6c8" font-weight="700">➜</tspan><tspan fill="#b8a2f2">  ~ </tspan>
    </text>
    <text class="cmd" x="104" y="80" font-size="15" fill="#e6edf3">whoami</text>

    <!-- Pixel banner: name lights up cell by cell, gradient flows through -->
    <g fill="url(#flow)"><rect class="px" x="64" y="108" width="13" height="13" rx="2.5" style="animation-delay:1.74s"/><rect class="px" x="80" y="108" width="13" height="13" rx="2.5" style="animation-delay:1.79s"/><rect class="px" x="96" y="108" width="13" height="13" rx="2.5" style="animation-delay:1.83s"/><rect class="px" x="48" y="124" width="13" height="13" rx="2.5" style="animation-delay:1.70s"/><rect class="px" x="112" y="124" width="13" height="13" rx="2.5" style="animation-delay:1.88s"/><rect class="px" x="48" y="140" width="13" height="13" rx="2.5" style="animation-delay:1.70s"/><rect class="px" x="112" y="140" width="13" height="13" rx="2.5" style="animation-delay:1.88s"/><rect class="px" x="48" y="156" width="13" height="13" rx="2.5" style="animation-delay:1.70s"/><rect class="px" x="64" y="156" width="13" height="13" rx="2.5" style="animation-delay:1.74s"/><rect class="px" x="80" y="156" width="13" height="13" rx="2.5" style="animation-delay:1.79s"/><rect class="px" x="96" y="156" width="13" height="13" rx="2.5" style="animation-delay:1.83s"/><rect class="px" x="112" y="156" width="13" height="13" rx="2.5" style="animation-delay:1.88s"/><rect class="px" x="48" y="172" width="13" height="13" rx="2.5" style="animation-delay:1.70s"/><rect class="px" x="112" y="172" width="13" height="13" rx="2.5" style="animation-delay:1.88s"/><rect class="px" x="48" y="188" width="13" height="13" rx="2.5" style="animation-delay:1.70s"/><rect class="px" x="112" y="188" width="13" height="13" rx="2.5" style="animation-delay:1.88s"/><rect class="px" x="48" y="204" width="13" height="13" rx="2.5" style="animation-delay:1.70s"/><rect class="px" x="112" y="204" width="13" height="13" rx="2.5" style="animation-delay:1.88s"/><rect class="px" x="146" y="108" width="13" height="13" rx="2.5" style="animation-delay:1.97s"/><rect class="px" x="162" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.02s"/><rect class="px" x="178" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.06s"/><rect class="px" x="194" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.10s"/><rect class="px" x="210" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.15s"/><rect class="px" x="210" y="124" width="13" height="13" rx="2.5" style="animation-delay:2.15s"/><rect class="px" x="194" y="140" width="13" height="13" rx="2.5" style="animation-delay:2.10s"/><rect class="px" x="178" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.06s"/><rect class="px" x="162" y="172" width="13" height="13" rx="2.5" style="animation-delay:2.02s"/><rect class="px" x="146" y="188" width="13" height="13" rx="2.5" style="animation-delay:1.97s"/><rect class="px" x="146" y="204" width="13" height="13" rx="2.5" style="animation-delay:1.97s"/><rect class="px" x="162" y="204" width="13" height="13" rx="2.5" style="animation-delay:2.02s"/><rect class="px" x="178" y="204" width="13" height="13" rx="2.5" style="animation-delay:2.06s"/><rect class="px" x="194" y="204" width="13" height="13" rx="2.5" style="animation-delay:2.10s"/><rect class="px" x="210" y="204" width="13" height="13" rx="2.5" style="animation-delay:2.15s"/><rect class="px" x="244" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.24s"/><rect class="px" x="308" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.42s"/><rect class="px" x="244" y="124" width="13" height="13" rx="2.5" style="animation-delay:2.24s"/><rect class="px" x="308" y="124" width="13" height="13" rx="2.5" style="animation-delay:2.42s"/><rect class="px" x="244" y="140" width="13" height="13" rx="2.5" style="animation-delay:2.24s"/><rect class="px" x="308" y="140" width="13" height="13" rx="2.5" style="animation-delay:2.42s"/><rect class="px" x="244" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.24s"/><rect class="px" x="260" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.29s"/><rect class="px" x="276" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.33s"/><rect class="px" x="292" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.38s"/><rect class="px" x="308" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.42s"/><rect class="px" x="244" y="172" width="13" height="13" rx="2.5" style="animation-delay:2.24s"/><rect class="px" x="308" y="172" width="13" height="13" rx="2.5" style="animation-delay:2.42s"/><rect class="px" x="244" y="188" width="13" height="13" rx="2.5" style="animation-delay:2.24s"/><rect class="px" x="308" y="188" width="13" height="13" rx="2.5" style="animation-delay:2.42s"/><rect class="px" x="244" y="204" width="13" height="13" rx="2.5" style="animation-delay:2.24s"/><rect class="px" x="308" y="204" width="13" height="13" rx="2.5" style="animation-delay:2.42s"/><rect class="px" x="358" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.55s"/><rect class="px" x="374" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.60s"/><rect class="px" x="390" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.65s"/><rect class="px" x="342" y="124" width="13" height="13" rx="2.5" style="animation-delay:2.51s"/><rect class="px" x="406" y="124" width="13" height="13" rx="2.5" style="animation-delay:2.69s"/><rect class="px" x="342" y="140" width="13" height="13" rx="2.5" style="animation-delay:2.51s"/><rect class="px" x="406" y="140" width="13" height="13" rx="2.5" style="animation-delay:2.69s"/><rect class="px" x="342" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.51s"/><rect class="px" x="358" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.55s"/><rect class="px" x="374" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.60s"/><rect class="px" x="390" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.65s"/><rect class="px" x="406" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.69s"/><rect class="px" x="342" y="172" width="13" height="13" rx="2.5" style="animation-delay:2.51s"/><rect class="px" x="406" y="172" width="13" height="13" rx="2.5" style="animation-delay:2.69s"/><rect class="px" x="342" y="188" width="13" height="13" rx="2.5" style="animation-delay:2.51s"/><rect class="px" x="406" y="188" width="13" height="13" rx="2.5" style="animation-delay:2.69s"/><rect class="px" x="342" y="204" width="13" height="13" rx="2.5" style="animation-delay:2.51s"/><rect class="px" x="406" y="204" width="13" height="13" rx="2.5" style="animation-delay:2.69s"/><rect class="px" x="440" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.78s"/><rect class="px" x="456" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.83s"/><rect class="px" x="472" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.87s"/><rect class="px" x="488" y="108" width="13" height="13" rx="2.5" style="animation-delay:2.92s"/><rect class="px" x="440" y="124" width="13" height="13" rx="2.5" style="animation-delay:2.78s"/><rect class="px" x="504" y="124" width="13" height="13" rx="2.5" style="animation-delay:2.96s"/><rect class="px" x="440" y="140" width="13" height="13" rx="2.5" style="animation-delay:2.78s"/><rect class="px" x="504" y="140" width="13" height="13" rx="2.5" style="animation-delay:2.96s"/><rect class="px" x="440" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.78s"/><rect class="px" x="456" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.83s"/><rect class="px" x="472" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.87s"/><rect class="px" x="488" y="156" width="13" height="13" rx="2.5" style="animation-delay:2.92s"/><rect class="px" x="440" y="172" width="13" height="13" rx="2.5" style="animation-delay:2.78s"/><rect class="px" x="472" y="172" width="13" height="13" rx="2.5" style="animation-delay:2.87s"/><rect class="px" x="440" y="188" width="13" height="13" rx="2.5" style="animation-delay:2.78s"/><rect class="px" x="488" y="188" width="13" height="13" rx="2.5" style="animation-delay:2.92s"/><rect class="px" x="440" y="204" width="13" height="13" rx="2.5" style="animation-delay:2.78s"/><rect class="px" x="504" y="204" width="13" height="13" rx="2.5" style="animation-delay:2.96s"/></g>

    <!-- Cycling taglines -->
    <g font-size="14.5">
      <text x="48" y="300" fill="#4fd6c8" font-weight="700">❯</text>
      <text class="tag t0" x="68" y="300" fill="#9aa4b2">building SideTerminal — your terminal, one edge away</text>
      <text class="tag t1" x="68" y="300" fill="#9aa4b2">Swift · AppKit · TypeScript · open source</text>
      <text class="tag t2" x="68" y="300" fill="#9aa4b2">I like terminals more than most people</text>
    </g>

    <!-- Final prompt with blinking caret -->
    <g class="fin">
      <text x="48" y="352" font-size="15">
        <tspan fill="#4fd6c8" font-weight="700">➜</tspan><tspan fill="#b8a2f2">  ~ </tspan>
      </text>
      <rect class="caret" x="104" y="339" width="9" height="16" fill="#4fd6c8"/>
    </g>

    <!-- CRT scanline + edge-reveal glow (SideTerminal homage) -->
    <rect class="scanline" x="8" y="0" width="864" height="70" fill="url(#scan)"/>
    <rect class="edgeglow" x="866" y="60" width="3" height="280" rx="1.5" fill="url(#edge)"/>
  </g>
</svg>
